name: pagla_chat
description: "A new Flutter project for Pagla Chat."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- ফায়ারবেস (Firebase) - ভার্সনগুলো লেটেস্ট করা হয়েছে ---
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.2
  firebase_messaging: ^14.9.4
  firebase_storage: ^11.7.7
  firebase_remote_config: ^4.4.10
  
  # --- গুগল লগইন ---
  google_sign_in: ^6.2.1

  # --- নোটিফিকেশন ---
  flutter_local_notifications: ^17.1.2

  # --- ভয়েস চ্যাট ও মিডিয়া (Agora) ---
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1 # এটি আপডেট করা জরুরি ছিল
  wakelock_plus: ^1.2.8
  universal_html: ^2.2.4
  audioplayers: ^5.2.1
  
  # --- ইউটিউব ও ওয়েব ---
  webview_flutter: ^4.7.0 # ভার্সন ৪.৪.২ থেকে ৪.৭.০ তে আনা হয়েছে
  http: ^1.2.1

  # --- ব্যাকগ্রাউন্ড ও ডিভাইস ইনফো ---
  flutter_background_service: ^5.0.10
  device_info_plus: ^9.1.2
  package_info_plus: ^8.0.2
  uuid: ^4.3.3

  # --- ইউটিলিটি ও ডিজাইন ---
  cached_network_image: ^3.3.1
  file_picker: ^8.0.3
  image_picker: ^1.1.1
  shared_preferences: ^2.2.3
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true 
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F0F1E"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
