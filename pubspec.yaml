name: pagla_chat
description: "A new Flutter project for Pagla Chat."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- ফায়ারবেস (Firebase) ---
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.2
  firebase_messaging: ^14.9.4
  firebase_storage: ^11.7.7
  firebase_remote_config: ^4.4.7
  intl: ^0.19.0

  # --- গুগল লগইন ---
  google_sign_in: ^6.2.1

  # --- নোটিফিকেশন ---
  flutter_local_notifications: ^17.1.2

  # --- ভয়েস চ্যাট, রেকর্ড ও মিডিয়া (Agora & Recording) ---
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1 
  wakelock_plus: ^1.2.8
  universal_html: ^2.2.4
  audioplayers: ^5.2.1
  record: ^5.1.0           # ✅ ভয়েস মেসেজ রেকর্ড করার জন্য নতুন যোগ করা হয়েছে
  path_provider: ^2.1.2    # ✅ অডিও/ভিডিও ফাইল পাথ হ্যান্ডেল করার জন্য
  path: ^1.9.0             # ✅ ফাইল ফরম্যাট ঠিক করার জন্য
  
  # --- ভিডিও প্লেয়ার ও প্রগ্রেস ---
  video_player: ^2.8.1     # ✅ ভিডিও মেসেজ প্লে করার জন্য
  chewie: ^1.8.1           # ✅ প্রিমিয়াম ভিডিও কন্ট্রোলারের জন্য
  percent_indicator: ^4.2.3 # ✅ আপলোড প্রগ্রেস দেখানোর জন্য

  # --- ইউটিউব ও ওয়েব ---
  webview_flutter: ^4.7.0 
  http: ^1.2.1

  # --- ব্যাকগ্রাউন্ড ও ডিভাইস ইনফো ---
  flutter_background_service: ^5.0.10
  device_info_plus: ^9.1.2
  package_info_plus: ^8.0.2
  uuid: ^4.3.3

  # --- ইউটিলিটি ও ডিজাইন ---
  cached_network_image: ^3.3.1
  file_picker: ^8.0.3
  image_picker: ^1.1.1
  shared_preferences: ^2.2.3
  lottie: ^3.1.2

  # ✅ ১. এই প্যাকেজটি এখানে অবশ্যই লাগবে (স্প্ল্যাশ স্ক্রিনের জন্য)
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

# --- ফোনের মেনু আইকন ---
flutter_launcher_icons:
  android: true 
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F0F1E"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21

# ✅ ২. এই কনফিগারেশনটুকু এখানে অবশ্যই লাগবে
flutter_native_splash:
  color: "#0F0F1E"
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#0F0F1E"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
