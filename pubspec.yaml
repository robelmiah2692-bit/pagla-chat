name: pagla_chat
description: "A new Flutter project for Pagla Chat."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- ফায়ারবেস (Firebase) ---
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_database: ^12.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  firebase_remote_config: ^6.4.0
  intl: ^0.20.2

  # --- গুগল লগইন ---
  google_sign_in: ^7.2.0

  # --- নোটিফিকেশন ---
  flutter_local_notifications: ^21.0.0

  # --- ভয়েস চ্যাট ও মিডিয়া (Agora & Recording) ---
  agora_rtc_engine: ^6.3.2
  permission_handler: ^12.0.1 
  wakelock_plus: ^1.2.8
  universal_html: ^2.2.4
  audioplayers: ^6.6.0
  
  # ✅ Fix: record_mp3 বা record 5.x বাদ দিয়ে এই ভার্সনটি ব্যবহার করুন। 
  # এটি লিনাক্স এবং অ্যান্ড্রোয়েড উভয় জায়গাতেই স্ট্যাবল।
  record: ^6.2.0            
  
  path_provider: ^2.1.2    
  path: ^1.9.0             
  
  # ✅ মিডিয়া সেভ করার প্যাকেজ
  gal: 2.3.2
  
  # --- ভিডিও প্লেয়ার ও প্রগ্রেস ---
  video_player: ^2.8.1     
  chewie: ^1.8.1           
  percent_indicator: ^4.2.3 

  # --- ইউটিউব ও ওয়েব ---
  webview_flutter: ^4.7.0 
  http: ^1.2.1

  # --- ব্যাকগ্রাউন্ড ও ডিভাইস ইনফো ---
  flutter_background_service: ^5.0.10
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  uuid: ^4.3.3

  # --- ইউটিলিটি ও ডিজাইন ---
  cached_network_image: ^3.3.1
  file_picker: ^11.0.2
  image_picker: ^1.1.1
  shared_preferences: ^2.2.3
  lottie: ^3.1.2

  # --- স্প্ল্যাশ স্ক্রিন ---
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

# ✅ http ভার্সন কনফ্লিক্ট মেটানোর জন্য
dependency_overrides:
  http: ^1.2.1

# --- ফোনের মেনু আইকন ---
flutter_launcher_icons:
  android: true 
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F0F1E"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21

# --- নেটিভ স্প্ল্যাশ কনফিগারেশন ---
flutter_native_splash:
  color: "#0F0F1E"
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#0F0F1E"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
