name: pagla_chat
description: "A new Flutter project for Pagla Chat."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- নোটিফিকেশন ---
  firebase_messaging: ^14.7.15 
  flutter_local_notifications: ^17.0.0

  
  # --- ভয়েস চ্যাট (Agora) ---
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.0
  wakelock_plus: ^1.2.8
  # --- ফায়ারবেস (Firebase) ---
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_database: ^10.4.9
  firebase_remote_config: ^4.3.8
  firebase_storage: ^11.6.0
  
  # --- গুগল লগইন ---
  google_sign_in: ^6.2.1

  # --- ইউটিউব ও ওয়েব ---
  webview_flutter: ^4.4.2
  http: ^1.2.0

  # --- ব্যাকগ্রাউন্ড সার্ভিস ও আইডি ---
  flutter_background_service: ^5.0.10
  device_info_plus: ^9.1.2
  package_info_plus: ^8.0.2
  uuid: ^4.3.3

  # --- অন্যান্য দরকারি প্যাকেজ ---
  cached_network_image: ^3.3.0
  file_picker: ^6.1.1
  audioplayers: ^5.2.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  lottie: ^3.1.0

# 🔥 এখানে স্পেসিং ঠিক করা হলো (মেইন লাইনে আনা হলো)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

# 🔥 আইকন সেটআপ
flutter_launcher_icons:
  android: true 
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F0F1E"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
