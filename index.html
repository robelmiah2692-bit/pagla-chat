  <style>
    /* স্প্ল্যাশ স্ক্রিন স্টাইল */
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0F0F1E;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loading-indicator img {
      width: 150px;
      height: 150px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>

<body style="background-color: #0F0F1E; margin: 0;">
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo">
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    // অ্যাপ লোড হয়ে গেলে লোডিং লোগো সরিয়ে ফেলার স্ক্রিপ্ট
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      setTimeout(function() {
        loader.style.display = 'none';
      }, 500); // আধ সেকেন্ড পর লোগো সরে যাবে
    });
  </script>
