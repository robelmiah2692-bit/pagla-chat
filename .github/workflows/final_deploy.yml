name: Master Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # --- ১. Java সেটআপ (অ্যান্ড্রয়েড বিল্ডের জন্য এটি বাধ্যতামূলক) ---
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' 
          cache: true

      # --- ২. ডিপেন্ডেন্সি ক্লিন এবং গেট ---
      - name: 🛠️ Install Dependencies
        run: |
          flutter clean
          flutter pub get

      # --- ৩. চাবি ম্যানেজমেন্ট (আপনার লজিক ঠিক রাখা হয়েছে) ---
      - name: 🔑 Handle Permanent Keystore
        run: |
          if [ ! -f android/app/upload-keystore.jks ]; then
            echo "স্থায়ী চাবি পাওয়া যায়নি, নতুন করে তৈরি করা হচ্ছে..."
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/upload-keystore.jks
            git commit -m "chore: add permanent keystore file [skip ci]" || echo "No changes to commit"
            git push || echo "Push failed, might already exist"
          else
            echo "চাবি অলরেডি প্রোজেক্টে আছে।"
          fi

      # --- ৪. Android APK Build (আগে APK বানানো নিরাপদ) ---
      - name: 🤖 Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      # --- ৫. APK ফাইলটি স্টোর করা ---
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagla-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- ৬. Web Build & Deploy (এগুলো অপশনাল হিসেবে শেষে রাখা হয়েছে) ---
      - name: 🌐 Build Web Release
        run: flutter build web --release --no-tree-shake-icons
        continue-on-error: true

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAGLA_CHAT }}'
          projectId: paglachat
          channelId: live
        continue-on-error: true

      - name: 🐙 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
        continue-on-error: true
