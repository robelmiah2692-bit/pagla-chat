name: Master Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # এখানে 'stable' এর বদলে নির্দিষ্ট এই ভার্সনটি দিন
          flutter-version: '3.22.0' 
          cache: true

      # --- ১. চাবি একবারই তৈরি হবে এবং প্রোজেক্টে পার্মানেন্টলি সেভ হবে ---
      - name: 🔑 Handle Permanent Keystore
        run: |
          if [ ! -f android/app/upload-keystore.jks ]; then
            echo "স্থায়ী চাবি পাওয়া যায়নি, নতুন করে তৈরি করা হচ্ছে..."
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/upload-keystore.jks
            git commit -m "chore: add permanent keystore file [skip ci]"
            git push
          else
            echo "চাবি অলরেডি প্রোজেক্টে আছে। নতুন চাবি বানানোর দরকার নেই।"
          fi

      # --- ২. এই SHA-1 টাই ফাইনাল, এটিই ফায়ারবেসে বসান ---
      - name: 📜 Show Final SHA-1
        run: |
          keytool -list -v -keystore android/app/upload-keystore.jks -alias pagla_alias -storepass pagla123 -keypass pagla123

      - name: 🛠️ Install Dependencies
        run: flutter pub get

      # --- ৩. Web Build & Deploy ---
      - name: 🌐 Build Web Release
        run: flutter build web --release --no-tree-shake-icons

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAGLA_CHAT }}'
          projectId: paglachat
          channelId: live

      - name: 🐙 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages

      # --- ৪. Android APK Build ---
      - name: 🤖 Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      # --- ৫. APK ফাইলটি স্টোর করা (ডাউনলোড করার জন্য) ---
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagla-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk
