name: Master Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' 
          cache: true

      - name: 🛠️ Clean & Sync
        run: |
          flutter clean
          flutter pub get

      - name: 🎨 Generate App Icons (The AAPT Fix)
        run: |
          # আপনার assets/logo.png থেকে অ্যান্ড্রয়েডের সব আইকন জেনারেট করা হচ্ছে
          # এটি না করলে বিল্ড টুল mipmap/ic_launcher খুঁজে পায় না
          flutter pub run flutter_launcher_icons

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 🔑 Handle Permanent Keystore
        run: |
          if [ ! -f android/app/upload-keystore.jks ]; then
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/upload-keystore.jks
            git commit -m "chore: add permanent keystore file [skip ci]" || echo "No changes to commit"
            git push origin main || echo "Push failed"
          fi

      - name: 🤖 Build Android APK
        run: |
          # আইকন জেনারেট হওয়ার পর এবার বিল্ড সফল হবে
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagla-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: 🐙 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
        continue-on-error: true
