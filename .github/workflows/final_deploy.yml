name: Master Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' 
          cache: true

      - name: 🛠️ Clean & Force Kotlin Path
        run: |
          # ১. পুরনো সব জটলা পরিষ্কার করা
          flutter clean
          rm -rf android/app/src/main/java/com/pagla
          rm -rf android/app/src/main/kotlin/com/pagla
          
          # ২. আপনার ম্যানিফেস্টের প্যাকেজ (com.pagla.chat) অনুযায়ী ফোল্ডার বানানো
          mkdir -p android/app/src/main/kotlin/com/pagla/chat
          
          # ৩. সঠিক প্যাকেজ নাম দিয়ে কোটলিন ফাইল তৈরি
          echo 'package com.pagla.chat
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/pagla/chat/MainActivity.kt
          
          flutter pub get

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 🔑 Handle Keystore
        run: |
          if [ ! -f android/app/upload-keystore.jks ]; then
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/upload-keystore.jks
            git commit -m "chore: add permanent keystore file [skip ci]" || echo "No changes to commit"
            git push origin main || echo "Push failed"
          fi

      - name: 🤖 Build Android APK
        run: |
          # সরাসরি বিল্ড, এবার ইনশাআল্লাহ আর এরর আসবে না
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagla-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: 🐙 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
        continue-on-error: true
