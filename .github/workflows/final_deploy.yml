name: Master Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' 
          cache: true

      - name: 🛠️ Hard Reset Android Configuration
        run: |
          # সব পুরনো কোড ও ক্যাশ মুছে ফেলা
          flutter clean
          rm -rf android/app/src/main/java
          rm -rf android/app/src/main/kotlin
          rm -rf .dart_tool
          
          # ফ্লাটারকে দিয়ে ফ্রেশ অ্যান্ড্রয়েড সেটআপ করানো (এটিই আসল ফিক্স)
          # আমরা কোনো ম্যানুয়াল ফাইল বানাবো না, ফ্লাটার অটোমেটিক তার প্রয়োজনীয় পাথ বানিয়ে নেবে
          flutter create . --platforms=android
          
          flutter pub get

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 🔑 Handle Permanent Keystore
        run: |
          if [ ! -f android/app/upload-keystore.jks ]; then
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/upload-keystore.jks
            git commit -m "chore: add permanent keystore file [skip ci]" || echo "No changes to commit"
            git push origin main || echo "Push failed"
          fi

      - name: 🤖 Build Android APK
        run: |
          # ফ্লাটার ৩.২২ এ অনেক সময় জাভা এরর দেয়, তাই আমরা একটু সাবধানী থাকব
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagla-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: 🌐 Build Web Release
        run: flutter build web --release --no-tree-shake-icons
        continue-on-error: true

      - name: 🐙 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
        continue-on-error: true
