name: Master Build and Deploy
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: 🛠️ Repair & Create Android Folder
        run: |
          # ফ্রেশ অ্যান্ড্রয়েড ফোল্ডার তৈরি
          flutter create . --platforms=android,web --project-name pagla_chat
          
          # অটোমেটিক পারমিশন ইনজেক্ট করা (আগোরা ও নোটিফিকেশনের জন্য)
          # এটি মূল ফাইলে কোনো ক্ষতি না করে শুধু পারমিশন লাইনগুলো যোগ করবে
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />' android/app/src/main/AndroidManifest.xml

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 🔑 Handle Permanent Keystore & SHA-1
        run: |
          mkdir -p android/app
          if [ ! -f android/app/upload-keystore.jks ]; then
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias pagla_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=PaglaChat, OU=Dev, O=Pagla, L=Dhaka, S=Dhaka, C=BD" -storepass pagla123 -keypass pagla123
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            git add -f android/app/upload-keystore.jks
            git commit -m "chore: add permanent release keystore [skip ci]" || echo "No changes"
            git push origin main || echo "Push skipped"
          fi
          
          echo "------- YOUR PERMANENT SHA-1 KEY BELOW -------"
          keytool -list -v -keystore android/app/upload-keystore.jks -alias pagla_alias -storepass pagla123 | grep SHA1
          echo "----------------------------------------------"

      - name: 📦 Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 🌐 Build Web
        run: |
          flutter build web --web-renderer canvaskit

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pagla-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/web
