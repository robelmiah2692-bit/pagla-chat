  <title>Pagla Chat</title>

  <style>
    .flutter-loader, #flutter-loader, picture, #splash, [id*="splash"], flutter-loading {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    #loading-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #0F0F1E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2147483647 !important;
    }
    #loading-indicator img {
      width: 150px;
      height: 150px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0F0F1E;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body style="background-color: #0F0F1E; margin: 0;">
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo" loading="eager">
    <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold;">Pagla Chat Loading...</p>
  </div>

  <script>
    // ফ্লাটার রেন্ডারার মোড সেটআপ
    window.flutterWebRenderer = "html"; 
  </script>

  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      setTimeout(function() {
        loader.style.transition = "opacity 1s ease";
        loader.style.opacity = "0";
        setTimeout(function() {
          loader.style.display = 'none';
        }, 1000);
      }, 3000); // লোডিং টাইম একটু কমানো হয়েছে ৩ সেকেন্ডে
    });

    // 🔴 অডিও আনলকার ও এগোরা স্ট্যাবিলিটি লজিক
    async function unlockAudio() {
        try {
            if (window.AudioContext || window.webkitAudioContext) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!window.myAudioCtx) window.myAudioCtx = new AudioContext();
                
                if (window.myAudioCtx.state === 'suspended') {
                    await window.myAudioCtx.resume();
                    console.log("🔊 Audio Context Resumed!");
                }
            }
            
            // এগোরা এসডিকে অটো-প্লে ফেইল হ্যান্ডলার
            if (typeof AgoraRTC !== 'undefined') {
                AgoraRTC.onAudioAutoplayFailed = () => {
                    console.warn("Autoplay failed, waiting for user interaction...");
                };
            }
        } catch (e) {
            console.error("Audio unlock failed:", e);
        }
    }

    // ইউজার যখনই স্ক্রিনে টাচ করবে বা ক্লিক করবে
    window.addEventListener('click', unlockAudio);
    window.addEventListener('touchstart', unlockAudio);

    // ট্যাব সুইচ করলে মাইক অটো-রিসুমে
    document.addEventListener("visibilitychange", function() {
      if (!document.hidden && window.myAudioCtx) {
        window.myAudioCtx.resume();
      }
    });

    // ব্রাউজার কনসোলে মাইক ডিটেকশন লগ
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
        navigator.mediaDevices.enumerateDevices().then(devices => {
          const hasMic = devices.some(d => d.kind === 'audioinput');
          if (hasMic) console.log("🎤 Microphone detected.");
        }).catch(err => console.error("Mic detection error:", err));
    }
  </script>


</body></html>
