  <style>
    /* 🔥 ডিফল্ট লোগোর সব রাস্তা বন্ধ */
    .flutter-loader, #flutter-loader, picture, #splash, [id*="splash"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #loading-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #0F0F1E;
      display: flex;
      flex-direction: column;
      align-items: center;

    }
    #loading-indicator img {
      width: 150px;
      height: 150px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

<body style="background-color: #0F0F1E; margin: 0;">
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo" loading="eager">
    <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold;">Pagla Chat Loading...</p>
  </div>

  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    // এই স্ক্রিপ্টটি আপনার লোগোকে ৪ সেকেন্ড ধরে রাখবে যাতে ডিফল্ট কিছু আসার সুযোগ না পায়
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      setTimeout(function() {
        loader.style.transition = "opacity 1.5s ease";
        loader.style.opacity = "0";
        setTimeout(function() {
          loader.style.display = 'none';
        }, 1500);
      }, 4000); 
    });
  </script>
</body>
