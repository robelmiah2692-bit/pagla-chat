<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project for Pagla Chat.">

  <title>Pagla Chat</title>
  
  <link rel="icon" type="image/png" href="favicon.png?v=101"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=101">
  <link rel="manifest" href="manifest.json">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA9KMdtIBNVYSASc5C2w5JGVTL-NISXFog",
      authDomain: "paglachat.firebaseapp.com",
      databaseURL: "https://paglachat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "paglachat",
      storageBucket: "paglachat.firebasestorage.app",
      messagingSenderId: "25052070011",
      appId: "1:25052070011:web:7c447f8d011fbdf3d662de",
      measurementId: "G-946LX0V0Q9"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <style>
    /* ফ্লাটারের ডিফল্ট লোডার পুরোপুরি বন্ধ করার জন্য */
    .flutter-loader {
      display: none !important;
    }

    #loading-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #0F0F1E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999; /* সবার উপরে থাকবে */
    }
    #loading-indicator img {
      width: 150px;
      height: 150px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body style="background-color: #0F0F1E; margin: 0;">
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo" id="logo-img" loading="eager">
    <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold;">Pagla Chat Loading...</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    // এই স্ক্রিপ্টটি নিশ্চিত করবে আপনার লোগোটি অন্তত ৩ সেকেন্ড থাকবে
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      
      // ফ্লাটার ইঞ্জিন পুরোপুরি তৈরি হওয়ার পর লোগো সরবে
      setTimeout(function() {
        loader.style.transition = "opacity 1s ease";
        loader.style.opacity = "0";
        setTimeout(function() {
          loader.style.display = 'none';
        }, 1000);
      }, 3000); // ৩ সেকেন্ডের জন্য লোগোটি আটকে থাকবে
    });
  </script>
</body>
</html>
