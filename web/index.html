  <style>
    .flutter-loader, #flutter-loader, picture, #splash, [id*="splash"], flutter-loading {

<body style="background-color: #0F0F1E; margin: 0;">
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo" loading="eager">
    <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold;">Pagla Chat Loading...</p>
  </div>

  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      setTimeout(function() {
        loader.style.transition = "opacity 1s ease";
        loader.style.opacity = "0";
        setTimeout(function() {
          loader.style.display = 'none';
        }, 1000);
      }, 5000);
    });

    Object.defineProperty(window, 'flutter_web_config', {
      value: { isVisible: false },
      writable: false
    });

    // 🔥 অডিও কন্টেক্সট এবং অটো-রিজুম লজিক (আঠার মতো লেগে থাকার জন্য)
    window.addEventListener('click', () => {
        // ১. ব্রাউজার অডিও কন্টেক্সট চালু করা
        if (window.AudioContext || window.webkitAudioContext) {
            const audioCtx = window.myAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
                console.log("✅ AudioContext Resumed!");
            }
            window.myAudioCtx = audioCtx;
        }

        // ২. এগোরা অটো-প্লে ফেইলর হ্যান্ডল করা
        if (window.AgoraRTC) {
            AgoraRTC.onAudioAutoplayFailed = () => {
                console.warn("⚠️ Autoplay failed, forcing resume...");
                if(window.myAudioCtx) window.myAudioCtx.resume();
            };
        }
    });

    // ৩. নেট চলে গেলে বা ট্যাব ইনঅ্যাক্টিভ হলে অটো-রিকানেক্ট সাপোর্ট
    document.addEventListener("visibilitychange", function() {
      if (!document.hidden) {
        console.log("♻️ Tab Active: Checking Audio...");
        if(window.myAudioCtx && window.myAudioCtx.state === 'suspended') {
          window.myAudioCtx.resume();
        }
      }
    });
  </script>
</body>
