  <style>
    /* 🔥 ডিফল্ট লোগোর সব রাস্তা বন্ধ করার জন্য */
    .flutter-loader, #flutter-loader, picture, #splash, [id*="splash"], flutter-loading {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    #loading-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #0F0F1E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2147483647 !important;
    }
    #loading-indicator img {
      width: 150px;
      height: 150px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>

<body style="background-color: #0F0F1E; margin: 0;">
  
  <div id="loading-indicator">
    <img src="favicon.png?v=101" alt="Logo" loading="eager">
    <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold;">Pagla Chat Loading...</p>
  </div>

  <script src="main.dart.js" type="application/javascript"></script>

  <script>
    // এই লজিকটি ডিফল্ট লোগোকে আসতে দেবে না
    window.addEventListener('load', function() {
      var loader = document.getElementById('loading-indicator');
      
      // ফ্লাটার ইঞ্জিন পুরোপুরি লোড হওয়ার জন্য ৩ সেকেন্ড সময় নেবে 
      // এবং আপনার লোগো ততক্ষণ পর্যন্ত পর্দা হয়ে দাঁড়িয়ে থাকবে।
      setTimeout(function() {
        loader.style.transition = "opacity 1s ease";
        loader.style.opacity = "0";
        setTimeout(function() {
          loader.style.display = 'none';
        }, 1000);
      }, 5000); // এখানে ৫ সেকেন্ড দিলাম যাতে ইঞ্জিন পুরোপুরি চালু হওয়ার গ্যাপ না পায়
    });

    // ফ্লাটার ইঞ্জিন যখন ইন্টারনাল স্প্ল্যাশ রেন্ডার করতে যাবে, এটা সেটা ব্লক করবে
    Object.defineProperty(window, 'flutter_web_config', {
      value: { isVisible: false },
      writable: false
    });
  </script>
</body>
