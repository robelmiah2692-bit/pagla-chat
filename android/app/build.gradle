buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // গ্র্যাডল ভার্সন ৮.২ এর সাথে সামঞ্জস্যতা
        classpath 'com.android.tools.build:gradle:8.2.1'
    }
}

plugins {
    id "com.android.application"
    id "kotlin-android"
    // নতুন নিয়ম অনুযায়ী ফ্লাটার প্লাগইন
    id "dev.flutter.flutter-gradle-plugin"
    // ফায়ারবেস গুগল সার্ভিস
    id "com.google.gms.google-services"
}

android {
    namespace "com.pagla.chat"
    compileSdk 34 

    signingConfigs {
        release {
            // গিটহাব অ্যাকশন যেন ফাইলটি খুঁজে পায়
            storeFile file("upload-keystore.jks") 
            storePassword "pagla123" 
            keyAlias "pagla_alias" 
            keyPassword "pagla123" 
        }
    }

    defaultConfig {
        applicationId "com.pagla.chat"
        minSdk 23
        targetSdk 34    
        versionCode 1
        versionName "1.0"
        multiDexEnabled true 
    }

    // --- মেমোরি এবং লাইব্রেরি কনফ্লিক্ট ফিক্স ---
    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst '**/libc++_shared.so'
        
        // ডুপ্লিকেট ফাইল এরর ফিক্স করার জন্য নিচের লাইনগুলো যোগ করা হয়েছে
        exclude 'META-INF/proguard/androidx-annotations.pro'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/kotlin-stdlib.kotlin_module'
        exclude 'META-INF/kotlin-stdlib-jdk8.kotlin_module'
        exclude 'META-INF/kotlin-stdlib-jdk7.kotlin_module'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release 
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    // সরাসরি কোটলিন ভার্সন বসানো হয়েছে
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // Firebase (Bom version 33.1.0)
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-messaging'
    
    // UI Stability and Android 15 support
    implementation 'androidx.window:window:1.2.0'
    implementation 'androidx.window:window-java:1.2.0'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
