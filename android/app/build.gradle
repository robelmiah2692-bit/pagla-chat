plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin" // এটিই মেইন বস
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

android {
    namespace "com.pagla.chat"
    compileSdk 34 

    signingConfigs {
        release {
            // আপনার গিটহাব অ্যাকশনে এই ফাইলটি জেনারেট হচ্ছে, তাই পাথ ঠিক আছে
            storeFile file("upload-keystore.jks") 
            storePassword "pagla123" 
            keyAlias "pagla_alias" 
            keyPassword "pagla123" 
        }
    }

    defaultConfig {
        applicationId "com.pagla.chat"
        minSdk 23 // নোটিফিকেশনের জন্য ২৩ থাকা ভালো
        targetSdk 34    
        versionCode 1
        versionName "1.0"
        multiDexEnabled true 
    }

    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst '**/libc++_shared.so'
        
        exclude 'META-INF/proguard/androidx-annotations.pro'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/kotlin-stdlib.kotlin_module'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release 
            minifyEnabled false // বিল্ড ফেইল করলে এটি আপাতত false রাখুন
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // এখানে শুধু নিচের ৩টি লাইন রাখুন, বাকি সব ফ্লাটার অটোমেটিক ম্যানেজ করবে
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.window:window:1.2.0'
    implementation 'androidx.window:window-java:1.2.0'
}
